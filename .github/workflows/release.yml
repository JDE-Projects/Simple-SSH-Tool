name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@50c6357e33a5c715e4f55df9e366c9600cca0943 # Build-Tools main (CI checks: ruff, import, pytest)
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleSSHTool
      dist_subfolder: "Simple SSH Tool"
      python_version: "3.14"
      build_command: "Build_Simple_SSH_Tool.bat"
      app_id: "b9ad4500-9ab4-4539-9903-f694ef0a8a44"  # stable installer GUID; never reuse or change
      entry_script: "simple_ssh_tool.py"
